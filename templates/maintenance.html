<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container { text-align: center; max-width: 600px; padding: 2rem; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { font-size: 1.1rem; color: #a0aec0; margin-bottom: 2rem; }
        .bar {
            width: 80px; height: 4px; background: #e53e3e; margin: 0 auto 1.5rem;
            border-radius: 2px;
        }
        .status {
            display: inline-block; padding: 0.5rem 1.5rem;
            border: 1px solid #e53e3e; border-radius: 6px;
            color: #e53e3e; font-size: 0.9rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Under Maintenance</h1>
        <div class="bar"></div>
        <p>PSR FM is currently undergoing scheduled maintenance. We'll be back shortly.</p>
        <span class="status">MAINTENANCE MODE</span>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psr.fm - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
    <style>
        .auth-body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: clip;
            width: 100%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-body::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.1) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.35; }
            50% { opacity: 0.7; }
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-color), #1ed760);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: black;
            box-shadow: 0 12px 32px rgba(29, 185, 84, 0.4);
            animation: float 6s ease-in-out infinite;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, var(--accent-color), #1ed760);
            border-radius: 24px;
            opacity: 0;
            z-index: -1;
            filter: blur(20px);
            animation: glow 3s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .auth-logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 18px;
            color: var(--text-secondary);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 52px 16px 52px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
        }

        .input-wrapper input:focus + i,
        .input-wrapper:focus-within i:first-child {
            color: var(--accent-color);
        }

        .toggle-password-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .toggle-password-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .error-message {
            background: rgba(226, 33, 52, 0.15);
            border: 1px solid rgba(226, 33, 52, 0.3);
            color: #ff6b7a;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .auth-submit-btn {
            background: linear-gradient(135deg, var(--accent-color), #1ed760);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .auth-submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .auth-submit-btn:hover::before {
            left: 100%;
        }

        .auth-submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(29, 185, 84, 0.4);
        }

        .auth-submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .auth-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-footer i {
            color: var(--accent-color);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 40px 24px;
            }
            .logo-icon {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .auth-logo h1 {
                font-size: 32px;
            }
        }
        /* PSR.FM listening-room identity */
        .auth-body { font-family: 'Manrope', system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, rgba(48,214,107,.14), transparent 34%), #070908; animation: none; overflow: auto; }
        .auth-body::before { inset: 0; background-image: linear-gradient(rgba(255,255,255,.018) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px); background-size: 44px 44px; animation: none; opacity: .4; }
        .auth-container { animation: slideUp .28s cubic-bezier(.2,.8,.2,1); }
        .auth-card { padding: 40px; border-radius: 20px; background: rgba(14,17,15,.96); border-color: rgba(223,255,232,.12); box-shadow: 0 28px 80px rgba(0,0,0,.5), inset 0 1px rgba(255,255,255,.04); }
        .logo-icon { width: 64px; height: 64px; margin-bottom: 20px; border-radius: 18px; background: #30d66b; box-shadow: 0 12px 30px rgba(48,214,107,.18); animation: none; }
        .logo-icon::after { display: none; }
        .auth-logo { margin-bottom: 32px; }
        .auth-logo h1 { font-family: 'Space Grotesk', sans-serif; font-size: 34px; background: none; color: #f5f7f5; -webkit-text-fill-color: currentColor; }
        .auth-logo p { color: #8f9891; }
        .auth-form { gap: 20px; }
        .input-wrapper input { min-height: 52px; border-width: 1px; border-radius: 12px; background: #090c0a; border-color: rgba(223,255,232,.12); font-size: 16px; }
        .auth-submit-btn { min-height: 52px; border-radius: 12px; background: #30d66b; transition: transform .18s, background .18s; }
        .auth-submit-btn::before { display: none; }
        .auth-submit-btn:hover:not(:disabled) { background: #55e584; transform: translateY(-1px); box-shadow: 0 12px 28px rgba(48,214,107,.16); }
        @media (max-width: 480px) { .auth-card { padding: 30px 22px; border-radius: 18px; } }
    </style>
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <div class="logo-icon">
                    <i class="fas fa-music"></i>
                </div>
                <h1>psr.fm</h1>
                <p>Your Personal Music Server</p>
            </div>
            
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" id="toggle-password" class="toggle-password-btn" aria-label="Show password" aria-pressed="false">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <div id="error-message" class="error-message" role="alert" aria-live="polite" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>
                
                <button type="submit" class="auth-submit-btn">
                    <span id="btn-text">Sign In</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin" style="display: none;"></i>
                    <i class="fas fa-arrow-right" id="btn-arrow"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p><i class="fas fa-shield-alt"></i>Enjoy your music</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('login-form');
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnArrow = document.getElementById('btn-arrow');
            const submitBtn = form.querySelector('.auth-submit-btn');
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
                const isVisible = type === 'text';
                toggleBtn.setAttribute('aria-pressed', String(isVisible));
                toggleBtn.setAttribute('aria-label', isVisible ? 'Hide password' : 'Show password');
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                btnText.innerText = 'Signing in...';
                btnSpinner.style.display = 'inline-block';
                btnArrow.style.display = 'none';
                submitBtn.disabled = true;
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username, password})
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok && data.status === 'success') {
                        btnText.innerText = 'Welcome!';
                        btnSpinner.style.display = 'none';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 500);
                    } else {
                        errorText.textContent = data.error || 'Login failed';
                        errorMsg.style.display = 'flex';
                        submitBtn.disabled = false;
                        btnText.innerText = 'Sign In';
                        btnArrow.style.display = 'inline-block';
                    }
                } catch (err) {
                    errorText.textContent = 'Connection error. Please try again.';
                    errorMsg.style.display = 'flex';
                    submitBtn.disabled = false;
                    btnText.innerText = 'Sign In';
                    btnArrow.style.display = 'inline-block';
                }
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>psr.fm - Initial Setup</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='favicon-32.png') }}">
    <style>
        .auth-body {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .auth-body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(29, 185, 84, 0.15) 0%, transparent 70%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            animation: slideUp 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-card {
            background: rgba(24, 24, 24, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.6), 
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .setup-card {
            background: linear-gradient(135deg, rgba(24, 24, 24, 0.95) 0%, rgba(29, 185, 84, 0.05) 100%);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .setup-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent-color), #1ed760);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
            color: black;
            box-shadow: 0 12px 32px rgba(29, 185, 84, 0.4);
            animation: float 6s ease-in-out infinite, rotate 20s linear infinite;
            position: relative;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .auth-logo h1 {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(90deg, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }

        .auth-logo p {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 500;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 600;
            margin-left: 4px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i:first-child {
            position: absolute;
            left: 18px;
            color: var(--text-secondary);
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 52px 16px 52px;
            background: rgba(10, 10, 10, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-color);
            background: rgba(10, 10, 10, 0.95);
            box-shadow: 0 0 0 4px rgba(29, 185, 84, 0.1);
        }

        .input-wrapper:focus-within i:first-child {
            color: var(--accent-color);
        }

        .toggle-password-btn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .toggle-password-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-hint {
            color: var(--text-secondary);
            font-size: 12px;
            margin-left: 8px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-hint::before {
            content: '•';
            color: var(--accent-color);
        }

        .error-message {
            background: rgba(226, 33, 52, 0.15);
            border: 1px solid rgba(226, 33, 52, 0.3);
            color: #ff6b7a;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }

        .auth-submit-btn {
            background: linear-gradient(135deg, var(--accent-color), #1ed760);
            color: black;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .auth-submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .auth-submit-btn:hover::before {
            left: 100%;
        }

        .auth-submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(29, 185, 84, 0.4);
        }

        .auth-submit-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .auth-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .auth-footer {
            text-align: center;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .auth-footer p {
            color: var(--text-secondary);
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .auth-footer i {
            color: var(--accent-color);
        }

        .music-notes {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .note {
            position: absolute;
            color: rgba(29, 185, 84, 0.1);
            font-size: 24px;
            animation: floatNote 20s infinite linear;
        }

        @keyframes floatNote {
            from { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            to { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 40px 24px;
            }
            .setup-icon {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }
            .auth-logo h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body class="auth-body">
    <div class="music-notes" id="music-notes"></div>
    
    <div class="auth-container">
        <div class="auth-card setup-card">
            <div class="auth-logo">
                <div class="setup-icon">
                    <i class="fas fa-magic"></i>
                </div>
                <h1>Welcome to psr.fm</h1>
                <p>Let's create your account to get started</p>
            </div>
            
            <form id="setup-form" class="auth-form">
                <div class="form-group">
                    <label for="username">Choose a Username</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="e.g. psr" required minlength="3" autocomplete="username">
                    </div>
                    <small class="input-hint">Minimum 3 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="password">Create a Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Minimum 6 characters" required minlength="6" autocomplete="new-password">
                        <button type="button" id="toggle-password" class="toggle-password-btn">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <small class="input-hint">Minimum 6 characters</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm-password" name="confirm-password" placeholder="Re-enter your password" required minlength="6" autocomplete="new-password">
                    </div>
                </div>
                
                <div id="error-message" class="error-message" style="display: none;">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="error-text"></span>
                </div>
                
                <button type="submit" class="auth-submit-btn">
                    <span id="btn-text">Create Account</span>
                    <i id="btn-spinner" class="fas fa-spinner fa-spin" style="display: none;"></i>
                    <i class="fas fa-arrow-right" id="btn-arrow"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p><i class="fas fa-info-circle"></i> This setup only appears once. Keep your credentials safe!</p>
            </div>
        </div>
    </div>

    <script>
        // Generate floating music notes
        const notesContainer = document.getElementById('music-notes');
        const notes = ['♪', '♫', '♬', '♭', '♮', '♯'];
        
        for (let i = 0; i < 6; i++) {
            const note = document.createElement('div');
            note.className = 'note';
            note.textContent = notes[Math.floor(Math.random() * notes.length)];
            note.style.left = Math.random() * 100 + '%';
            note.style.animationDelay = Math.random() * 20 + 's';
            note.style.animationDuration = (15 + Math.random() * 10) + 's';
            notesContainer.appendChild(note);
        }

        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('setup-form');
            const errorMsg = document.getElementById('error-message');
            const errorText = document.getElementById('error-text');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const btnArrow = document.getElementById('btn-arrow');
            const submitBtn = form.querySelector('.auth-submit-btn');
            const toggleBtn = document.getElementById('toggle-password');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                toggleBtn.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorMsg.style.display = 'none';
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirm-password').value;
                
                if (password !== confirmPassword) {
                    errorText.textContent = 'Passwords do not match';
                    errorMsg.style.display = 'flex';
                    return;
                }
                
                btnText.innerText = 'Creating account...';
                btnSpinner.style.display = 'inline-block';
                btnArrow.style.display = 'none';
                submitBtn.disabled = true;
                
                try {
                    const res = await fetch('/api/setup', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username, password})
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok && data.status === 'success') {
                        btnText.innerText = 'Account created!';
                        btnSpinner.style.display = 'none';
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 500);
                    } else {
                        errorText.textContent = data.error || 'Setup failed';
                        errorMsg.style.display = 'flex';
                        submitBtn.disabled = false;
                        btnText.innerText = 'Create Account';
                        btnArrow.style.display = 'inline-block';
                    }
                } catch (err) {
                    errorText.textContent = 'Connection error. Please try again.';
                    errorMsg.style.display = 'flex';
                    submitBtn.disabled = false;
                    btnText.innerText = 'Create Account';
                    btnArrow.style.display = 'inline-block';
                }
            });
        });
    </script>
</body>
</html>
